<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chai Tailwind</title>
    <style>
      * {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

  <body>
    <h1 class="chai-text-orange chai-capitalize chai-font-bold chai-bg-teal chai-p-10 chai-rounded-md chai-text-center chai-w-75 chai-mx-auto">Welcome to chai tailwind</h1>
    <div class="card chai-p-20 chai-text-center chai-w-25 chai-mx-auto chai-border-2 chai-border-orange chai-rounded-lg chai-shadow-lg">
      <h2 class="chai-m-0">Chai Tailwind Card</h2>
      <div class="chai-text-orange">-------------------------------------------</div>
      <p class="chai-text-gray">This page is made using chai tailwind</p>
      <button class="chai-bg-orange chai-text-white chai-p-12 chai-rounded-full chai-font-semibold chai-shadow-md chai-cursor-pointer chai-capitalize">get started</button>
    </div>

    <section class="chai-w-75 chai-mx-auto chai-mt-24 chai-border-2 chai-border-gray chai-rounded-lg chai-shadow-lg chai-overflow-hidden">
      <h2 class="chai-bg-gray chai-p-10 chai-m-0 chai-font-semibold">Chai Playground</h2>

      <div class="chai-grid chai-grid-cols-2 chai-min-h-400">
        <div>
          <h3 class="chai-m-0 chai-p-10 chai-bg-gray">HTML Editor</h3>
          <textarea id="chai-playground-input" class="chai-p-12 chai-border-r chai-border-gray chai-min-h-400 chai-w-90">
<div class="chai-p-16 chai-border-2 chai-border-orange chai-rounded-md chai-m-10">
  <h3 class="chai-text-orange chai-m-0">Hello from Playground</h3>
  <p class="chai-text-gray chai-mt-10">Edit this HTML on the left side.</p>
  <button class="chai-bg-orange chai-text-white chai-px-12 chai-py-8 chai-rounded-full chai-mt-10">Try Now</button>
</div>
          </textarea>
        </div>

        <div>
          <h3 class="chai-m-0 chai-p-10 chai-bg-gray">Live Preview</h3>
          <iframe id="chai-playground-preview" class="chai-w-100 chai-min-h-400"></iframe>
        </div>
      </div>
    </section>

    <script type="module" src="main.js"></script>
